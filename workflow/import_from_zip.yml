# .github/workflows/import_from_zip.yml — podkop_bot
# Imports a release ZIP into the podkop_bot repository.
# Run manually: Actions → import-from-zip → Run workflow
#
# Expected layout INSIDE the zip (flat or under one top-level dir):
#   podkop_bot.sh         — main bot script
#   podkop_bot_init       — /etc/init.d script
#   version.txt           — current version string
#   highlights.txt        — what's new (shown in bot update card)
#   CHANGELOG.md          — changelog (EN)
#   CHANGELOG_RUS.md      — changelog (RU)
#   README.md             — (optional)

name: import-from-zip

on:
  workflow_dispatch:
    inputs:
      zip_path:
        description: "Path to zip inside the repository (e.g. _incoming/podkop_bot_v0.15.7.zip)"
        required: true
        default: "_incoming/podkop_bot_v0.15.7.zip"
      commit_message:
        description: "Commit message"
        required: true
        default: "Import podkop_bot v0.15.7 from ZIP"

permissions:
  contents: write

jobs:
  import:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate zip exists
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f "${{ inputs.zip_path }}" ]; then
            echo "ERROR: zip not found at '${{ inputs.zip_path }}'"
            echo "Available files in _incoming/:"
            ls -la _incoming/ 2>/dev/null || echo "  (_incoming/ does not exist)"
            exit 1
          fi

      - name: Unpack zip
        shell: bash
        run: |
          set -euo pipefail
          rm -rf _workzip
          mkdir -p _workzip
          unzip -q "${{ inputs.zip_path }}" -d _workzip
          echo "=== ZIP contents ==="
          find _workzip -type f | sort

      - name: Detect source root
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          # Flat zip (files at root level)
          if [ -f "_workzip/podkop_bot.sh" ]; then
            echo "src=_workzip" >> "$GITHUB_OUTPUT"
            echo "Flat zip detected, using _workzip"
            exit 0
          fi

          # Single top-level directory
          first_dir="$(find _workzip -mindepth 1 -maxdepth 1 -type d | head -n 1 || true)"
          if [ -n "$first_dir" ] && [ -f "$first_dir/podkop_bot.sh" ]; then
            echo "src=$first_dir" >> "$GITHUB_OUTPUT"
            echo "Using directory: $first_dir"
            exit 0
          fi

          echo "ERROR: Cannot find podkop_bot.sh inside zip"
          exit 1

      - name: Validate required files
        shell: bash
        run: |
          set -euo pipefail
          SRC="${{ steps.detect.outputs.src }}"

          test -f "$SRC/podkop_bot.sh"    || { echo "MISSING: podkop_bot.sh";    exit 1; }
          test -f "$SRC/podkop_bot_init"  || { echo "MISSING: podkop_bot_init";  exit 1; }
          test -f "$SRC/version.txt"      || { echo "MISSING: version.txt";      exit 1; }
          test -f "$SRC/highlights.txt"   || { echo "MISSING: highlights.txt";   exit 1; }
          test -f "$SRC/CHANGELOG.md"     || { echo "MISSING: CHANGELOG.md";     exit 1; }
          test -f "$SRC/CHANGELOG_RUS.md" || { echo "MISSING: CHANGELOG_RUS.md"; exit 1; }

          echo "All required files present."

      - name: Shell syntax check
        shell: bash
        run: |
          set -euo pipefail
          SRC="${{ steps.detect.outputs.src }}"
          fail=0

          for f in "$SRC/podkop_bot.sh" "$SRC/podkop_bot_init"; do
            if bash -n "$f" 2>/tmp/sherr; then
              echo "OK (bash -n):   $f"
            else
              echo "FAIL (bash -n): $f"; cat /tmp/sherr; fail=1
            fi
            if dash -n "$f" 2>/tmp/sherr; then
              echo "OK (dash -n):   $f"
            else
              echo "FAIL (dash -n): $f"; cat /tmp/sherr; fail=1
            fi
          done

          [ "$fail" -eq 0 ] || { echo "Shell syntax check failed"; exit 1; }

      - name: Validate version consistency
        shell: bash
        run: |
          set -euo pipefail
          SRC="${{ steps.detect.outputs.src }}"

          VER_TXT="$(cat "$SRC/version.txt" | tr -d '[:space:]')"
          VER_BOT="$(grep '^BOT_VERSION=' "$SRC/podkop_bot.sh" | cut -d'"' -f2 | tr -d '[:space:]')"

          echo "version.txt:  $VER_TXT"
          echo "BOT_VERSION:  $VER_BOT"

          if [ "$VER_TXT" != "$VER_BOT" ]; then
            echo "ERROR: version mismatch — version.txt=$VER_TXT but BOT_VERSION=$VER_BOT"
            exit 1
          fi

          # Check that CHANGELOG.md mentions this version
          if grep -q "## v${VER_TXT}" "$SRC/CHANGELOG.md"; then
            echo "OK: CHANGELOG.md contains ## v${VER_TXT}"
          else
            echo "WARN: CHANGELOG.md does not contain ## v${VER_TXT} — proceeding anyway"
          fi

          echo "Version check passed: $VER_TXT"

      - name: Import files
        shell: bash
        run: |
          set -euo pipefail
          SRC="${{ steps.detect.outputs.src }}"

          # Managed files — overwrite from zip
          cp -a "$SRC/podkop_bot.sh"    podkop_bot.sh
          cp -a "$SRC/podkop_bot_init"  podkop_bot_init
          cp -a "$SRC/version.txt"      version.txt
          cp -a "$SRC/highlights.txt"   highlights.txt
          cp -a "$SRC/CHANGELOG.md"     CHANGELOG.md
          cp -a "$SRC/CHANGELOG_RUS.md" CHANGELOG_RUS.md

          # README is optional — update only if present in zip
          if [ -f "$SRC/README.md" ]; then
            cp -a "$SRC/README.md" README.md
            echo "README.md updated from zip"
          else
            echo "No README.md in zip — keeping existing"
          fi

          # Do NOT touch: .github/, _incoming/, install.sh, or any other repo files.

      - name: Set permissions
        shell: bash
        run: |
          set -euo pipefail
          chmod +x podkop_bot.sh podkop_bot_init
          chmod 0644 version.txt highlights.txt CHANGELOG.md CHANGELOG_RUS.md
          [ -f README.md ] && chmod 0644 README.md || true

      - name: Post-import validation
        shell: bash
        run: |
          set -euo pipefail
          echo "=== Imported files ==="
          ls -lh podkop_bot.sh podkop_bot_init version.txt highlights.txt CHANGELOG.md CHANGELOG_RUS.md README.md 2>/dev/null || true
          echo ""
          echo "=== Version in repo ==="
          grep '^BOT_VERSION=' podkop_bot.sh
          cat version.txt

      - name: Show git diff summary
        shell: bash
        run: |
          git status --short
          git diff --stat

      - name: Commit and push
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add podkop_bot.sh podkop_bot_init version.txt highlights.txt \
                  CHANGELOG.md CHANGELOG_RUS.md README.md

          if git diff --cached --quiet; then
            echo "No changes to commit — zip matches current repo state"
            exit 0
          fi

          git commit -m "${{ inputs.commit_message }}"
          git push
